default_stages: [pre-commit, pre-push]
minimum_prek_version: "0.3.4"
default_language_version:
  python: python3
exclude: ^(logs/|\.venv/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-toml
      - id: check-yaml

  - repo: local
    hooks:
      - id: ruff
        name: Run ruff for Python linting
        entry: ruff check --force-exclude --fix
        language: python
        types_or: [python, pyi]
        require_serial: true
        additional_dependencies: ["ruff==0.11.6"]

      - id: ruff-format
        name: Run ruff format for Python formatting
        entry: ruff format --force-exclude
        language: python
        types_or: [python, pyi]
        require_serial: true
        additional_dependencies: ["ruff==0.11.6"]

      - id: ty
        name: Run ty for static type checking
        entry: ty check --extra-search-path scripts/prek src scripts/prek tests
        language: python
        pass_filenames: false
        require_serial: true
        additional_dependencies: ["ty", "pytest>=8.3.5,<9"]

      - id: check-no-stdout-prints
        name: Check hook source does not print to stdout
        entry: ./scripts/prek/check_no_stdout_prints.py
        language: python
        files: ^src/.*\.py$
        require_serial: true
