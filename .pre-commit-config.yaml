---
minimum_prek_version: "0.3.8"
default_language_version:
  python: python3

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: ruff
        name: Run ruff for Python linting
        entry: ruff check --force-exclude
        language: python
        types_or: [python, pyi]
        require_serial: true
        additional_dependencies: ["ruff==0.11.6"]

      - id: check-no-stdout-prints
        name: Reject stdout print() in hook source
        entry: python scripts/prek/check_no_stdout_prints.py
        language: python
        types_or: [python, pyi]
        files: >
          (?x)
          ^src/.*\.py$|
          ^examples/.*\.py$|
          ^scripts/prek/.*\.py$
        require_serial: true
