site_name: Agent Hooks
site_description: Local callback framework and macOS-ready hook CLI for Claude Code and Codex
repo_url: https://github.com/jason810496/agent-hooks
repo_name: jason810496/agent-hooks
site_url: https://jason810496.github.io/agent-hooks/

theme:
  name: material
  logo: assets/agent-hooks-logo-mark.svg
  favicon: assets/agent-hooks-logo-mark.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.instant
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tilde
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Features: features.md
  - Getting Started:
      - macOS Quickstart: getting-started/macos-quickstart.md
  - CLI:
      - Built-in Callback: cli/builtin-callback.md
      - Custom Apps: cli/custom-apps.md
  - Framework:
      - AgentHook: framework/agenthook.md
      - Events and Injection: framework/events-and-injection.md
      - Middleware: framework/middleware.md
  - Architecture:
      - Overview: architecture/overview.md
      - Provider Adapters: architecture/provider-adapters.md
  - Providers:
      - Claude Code: providers/claude-code.md
      - Codex: providers/codex.md
  - Reference:
      - Configuration: reference/configuration.md
      - Logging: reference/logging.md
      - Limitations: reference/limitations.md
