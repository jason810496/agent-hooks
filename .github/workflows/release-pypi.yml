name: Release PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-pypi-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !contains(github.ref_name, 'rc') }}
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/agent-hooks/

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv==0.11.7

      - name: Validate release metadata
        run: >
          uv run python -m scripts.release.manage_version validate
          --tag "${GITHUB_REF_NAME}"
          --expected-channel stable
          --require-project-match

      - name: Run lint
        run: uvx ruff check .

      - name: Run tests
        run: uv run --group dev pytest

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          print-hash: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/*.tar.gz dist/*.whl dist/*.publish.attestation)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found in dist/." >&2
            exit 1
          fi

          gh release create "${GITHUB_REF_NAME}" "${files[@]}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
