name: Release Candidate

on:
  push:
    tags:
      - "v*rc*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-candidate-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/project/agent-hooks/

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv==0.11.7

      - name: Validate release metadata
        run: >
          uv run python -m scripts.release.manage_version validate
          --tag "${GITHUB_REF_NAME}"
          --expected-channel rc
          --require-project-match

      - name: Run lint
        run: uvx ruff check .

      - name: Run tests
        run: uv run --group dev pytest

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: uvx twine check dist/*

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true

      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release Candidate ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/*
